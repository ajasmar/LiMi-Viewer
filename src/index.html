<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>LiMi Model Collapsible Flowchart</title>
  <style>
    body {
      text-align: center;
      margin: 0;
      padding: 0;
    }
	svg {
      display: block;
      margin: 0 auto;
	  border: 1px solid #ccc;
    }

  </style>
</head>
<body>
  <h1>LiMi Metadata Model Viewer</h1>
	<div id="search-container" style="position: absolute; top: 20px; left: 20px; z-index: 10; font-family: sans-serif; background: rgba(255,255,255,0.9); padding: 8px; border-radius: 4px; border: 1px solid #ccc;">
		<input type="text" id="search-input" placeholder="Search nodes...">
		<button id="search-btn">Search</button>
		<button id="clear-btn">Clear</button>
		<span id="search-status"></span>
	</div>
  <svg id="chart" width=90% height="800"></svg>
  <script src="https://d3js.org/d3.v7.min.js"></script>
  <script src="LiMi_Viewer.js"></script>
</body>

</html>
